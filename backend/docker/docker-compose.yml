services:

  postgres:
    image: postgres:15

    container_name: streambill_postgres

    environment:
      POSTGRES_DB: streambill
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: streambill_redis

    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: